<body>
    <header>
        <!--nav bar-->
        <nav>
            <a href="index.html">
                <img src="assets/images/logo.jpg" alt="HandyFix Logo" id="logo">
            </a>
            <div id="menu">
                <a href="index.html">Home</a>
                <a href="index.html#about">About</a>
                <a href="service.html">Services</a>
                <a href="service.html#price">Price</a>
                <a href="contact.html">Contact us</a>
            </div>
        </nav>
    </header>

    <!--Contact info section-->
    <section>
        <h2>Contact us</h2>
        <div>
            <i class="fa-solid fa-phone"></i>
            <p>+447485976489</p>
        </div>

        <div>
            <i class="fa-solid fa-at"></i>
            <p>info@handyfix.co.uk</p>
        </div>

        <div>
            <i class="fa-regular fa-clock"></i>
            <p>Monday-Friday</p>
            <p>08:00-22:00h</p>
            <p>Saturday-Sunday</p>
            <p>08:00-18:00h</p>
        </div>

        <!--Contact us form-->
        <div>
            <!--I`m not using method atribute, because is not allowing me after submitiing to redirect to success page -->
            <!--The idea for success page it is from slack channel #project-milestone-1-->
            <!--The success page code is contributed from https://codepen.io/warrendunlop/pen/YmVKzm; It has been modified for my specific requirements-->
            <form action="success.html">
                <h2>Get in touch!</h2>
                <label for="name"></label>
                <input type="text" id="name" name="full_name" placeholder="Enter your full name" required>
                <label for="email"></label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                <textarea name="message" id="message" placeholder="Enter your message" rows="10" cols="30" required></textarea>
                <a href="success.html">
                    <input type="submit" value="Submit"/>
                </a>
            </form>
        </div>

        <!--Embed google maps with help from https://blog.hubspot.com/website/how-to-embed-google-map-in-html-->
        <div>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d39721.75393640285!2d-0.13160595136716252!3d51.520377600000025!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x48761cd17b06193d%3A0xb20647c5317e9f54!2sHandyman%20Services%20London!5e0!3m2!1sbg!2suk!4v1695601224565!5m2!1sbg!2suk" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </section>
    
    <footer>
        <!--logo and social media links-->
        <div>
            <a href="index.html">
                <img src="assets/images/logo.jpg" alt="HandyFix Logo" id="handyfix-logo">
            </a>

            <a href="https://www.instagram.com/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://twitter.com/" target="_blank"><i class="fa-brands fa-twitter"></i></a>
        </div>

            <h4>Contact Info</h4>
            <i class="fa-solid fa-location-dot"></i>
            <p>London, United Kingdom</p>
            <i class="fa-solid fa-phone"></i>
            <p>+447485976489</p>
            <i class="fa-solid fa-at"></i>
            <p>info@handyfix.co.uk</p>
        </div>
    
        <!--Quick links in footer section-->
        <div>
            <h4>Quick Links</h4>
            <p><a href="index.html">Home</a></p>
            <p><a href="index.html#about">About</a></p>
            <p><a href="service.html">Services</a></p>
            <p><a href="service.html#price">Price</a>
            </p>
            <p><a href="contact.html">Contact us</a></p>
        </div>
